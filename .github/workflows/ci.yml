name: CI Build

# Build-only workflow for a static/PHP/docs repo. No JS build step exists.
# Verifies the content is well-formed (HTML/PHP syntax checks where possible).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify content present
        run: |
          files=$(find . -maxdepth 2 -type f -not -path "./.git/*" | wc -l)
          echo "Found $files files at top levels"
          if [ "$files" -lt 3 ]; then
            echo "ERROR: Repo appears empty (less than 3 files)"
            exit 1
          fi

      - name: HTML sanity check
        run: |
          bad=0
          for f in $(find . -maxdepth 3 -name "*.html" -not -path "./.git/*"); do
            if [ ! -s "$f" ]; then
              echo "EMPTY: $f"
              bad=1
            fi
          done
          if [ "$bad" -eq 1 ]; then
            echo "Empty HTML files found"
            exit 1
          fi
          echo "All HTML files non-empty"

